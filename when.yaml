---
- name: Prueba con WHEN. Visualizar la fecha en los redhat
  hosts: redhat2

  tasks:
  - name: Capturar fecha
    shell:
     cmd: date
    register: fecha
    when: ansible_distribution=='RedHat'

  - name: Visualizar fecha
    ansible.builtin.debug: 
      msg: "{{fecha.stdout}}"
    when: ansible_distribution=='RedHat'