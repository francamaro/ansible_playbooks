---
- name: Primer play del curso
  hosts: all

  tasks:
    - name: Hacer un ping
      ansible.builtin.ping: 
    - name: Crear un fichero
      ansible.builtin.shell:
        touch /tmp/fichero1.txt

- name: Instalar Nginx
  hosts: all
  become: true
  become_method: sudo
  become_user: root

  tasks:
    - name: Stop Apache
      ansible.builtin.service:
        name: httpd
        state: stopped

    - name: Instalar Nginx
      ansible.builtin.yum:
        name: nginx
        state: present

    - name: Iniciar nginx
      ansible.builtin.service:
        name: nginx
        state: started

    - name: Copiar index.html
      ansible.builtin.copy:
        src: ./recursos/index.html
        dest: /var/www/html
        owner: root
        group: root
        mode: '0644'  
    
